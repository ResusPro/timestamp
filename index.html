<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1f3a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Timestamp" />
  <title>Timestamp Logger</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    :root{--bg:#071625;--panel:#10263f;--panel2:#163557;--text:#f3f7fb;--muted:#b8c7d6;--accent:#33d17a;--warn:#ffcc00;--danger:#ff5c5c;--border:rgba(255,255,255,.14)}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);background:radial-gradient(circle at top,#153c66 0,#071625 45%,#04101c 100%);padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom)}
    main{width:min(720px,100%);margin:0 auto;padding:18px 0 32px} header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:16px} h1{font-size:1.65rem;line-height:1.1;margin:0 0 4px;letter-spacing:-.02em}.sub{color:var(--muted);font-size:.95rem}.clock{text-align:right;font-variant-numeric:tabular-nums;color:var(--muted);min-width:95px}.clock strong{display:block;color:var(--text);font-size:1.25rem}
    .card{background:rgba(16,38,63,.92);border:1px solid var(--border);border-radius:20px;padding:16px;box-shadow:0 12px 32px rgba(0,0,0,.28);margin-bottom:14px;backdrop-filter:blur(8px)} label{display:block;color:var(--muted);font-size:.82rem;margin-bottom:6px} input,textarea{width:100%;background:#071625;color:var(--text);border:1px solid var(--border);border-radius:12px;padding:12px;font-size:1rem;outline:none} textarea{min-height:78px;resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
    button{appearance:none;border:0;border-radius:16px;padding:16px 14px;font-size:1rem;font-weight:700;color:var(--text);background:var(--panel2);box-shadow:inset 0 0 0 1px var(--border);min-height:58px;cursor:pointer;touch-action:manipulation} button:active{transform:translateY(1px)}.primary{background:linear-gradient(135deg,#1ca55c,#11854b);font-size:1.2rem;min-height:76px}.secondary{background:#1b426d}.danger{background:#733}.button-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.button-grid button{min-height:72px}.status{border-radius:14px;padding:12px;background:rgba(255,255,255,.08);color:var(--muted);font-size:.95rem;min-height:44px}.status.ok{color:#d8ffe8;background:rgba(51,209,122,.18)}.status.bad{color:#ffe1e1;background:rgba(255,92,92,.18)}.status.warn{color:#fff4c2;background:rgba(255,204,0,.16)}.history-item{border-top:1px solid var(--border);padding:10px 0;color:var(--muted);font-size:.93rem}.history-item:first-child{border-top:0}.history-item strong{color:var(--text);font-variant-numeric:tabular-nums} details summary{cursor:pointer;color:var(--muted);font-weight:700;margin-bottom:10px}.small{font-size:.85rem;color:var(--muted);line-height:1.4}.hidden{display:none!important}@media(min-width:640px){.button-grid{grid-template-columns:repeat(3,1fr)}}
  </style>
</head>
<body>
<main>
  <header><div><h1>Timestamp Logger</h1><div class="sub">One-tap timeline entries and voice notes</div></div><div class="clock"><strong id="clockTime">--:--</strong><span id="clockDate">--</span></div></header>
  <section class="card"><button class="primary" id="voiceButton">🎙️ Voice note</button><div class="row"><button class="secondary" id="manualButton">✍️ Manual note</button><button class="secondary hidden" id="installButton">⬇️ Install</button></div><div id="status" class="status" style="margin-top:12px;">Ready.</div></section>
  <section class="card"><div class="button-grid" id="presetGrid"></div></section>
  <section class="card" id="manualCard" style="display:none;"><label for="manualNote">Manual note</label><textarea id="manualNote" placeholder="e.g. Tourniquet applied left thigh"></textarea><div class="row"><button class="primary" id="sendManualButton">Send note</button><button class="danger" id="cancelManualButton">Cancel</button></div></section>
  <section class="card"><details><summary>Settings</summary><label for="endpoint">Apps Script Web App URL</label><input id="endpoint" placeholder="https://script.google.com/macros/s/.../exec" /><div class="row"><div><label for="userName">User</label><input id="userName" placeholder="e.g. Nick" /></div><div><label for="incidentId">Incident ID</label><input id="incidentId" placeholder="optional" /></div></div><div class="row"><button id="saveSettingsButton">Save settings</button><button id="testButton">Send test</button></div><p class="small">Settings are stored locally on this device. For first deployment, paste your Google Apps Script Web App URL here.</p></details></section>
  <section class="card"><details open><summary>Recent entries on this device</summary><div id="history"></div></details></section>
</main>
<script>
const DEFAULT_ENDPOINT_URL=""; // optional: paste Apps Script URL here before deployment
const DEFAULT_USER="";
const APP_SOURCE="AndroidPWA";
const PRESET_EVENTS=[
  {label:"Patient contact",type:"PATIENT_CONTACT"},{label:"Mobile landed",type:"MOBILE_LANDED"},{label:"Ready to move",type:"READY_TO_MOVE"},{label:"Depart scene",type:"DEPART_SCENE"},{label:"Hospital arrival",type:"HOSPITAL_ARRIVAL"},{label:"Handover",type:"HANDOVER"},{label:"RSI",type:"RSI"},{label:"TXA",type:"TXA"},{label:"Blood given",type:"BLOOD_GIVEN"},{label:"Tourniquet",type:"TOURNIQUET"},{label:"Chest decompression",type:"CHEST_DECOMPRESSION"},{label:"ROSC",type:"ROSC"}
];
const $=id=>document.getElementById(id); const state={deferredInstallPrompt:null,recognition:null,isListening:false};
function formatTime(date=new Date()){return new Intl.DateTimeFormat("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false}).format(date)}
function formatDate(date=new Date()){return new Intl.DateTimeFormat("en-GB",{weekday:"short",day:"2-digit",month:"short"}).format(date)}
function updateClock(){ $("clockTime").textContent=formatTime(); $("clockDate").textContent=formatDate(); }
function setStatus(message,kind=""){const el=$("status"); el.className="status"+(kind?" "+kind:""); el.textContent=message;}
function loadSettings(){ $("endpoint").value=localStorage.getItem("timestamp_endpoint")||DEFAULT_ENDPOINT_URL; $("userName").value=localStorage.getItem("timestamp_user")||DEFAULT_USER; $("incidentId").value=localStorage.getItem("timestamp_incident")||"";}
function saveSettings(){ localStorage.setItem("timestamp_endpoint",$("endpoint").value.trim()); localStorage.setItem("timestamp_user",$("userName").value.trim()); localStorage.setItem("timestamp_incident",$("incidentId").value.trim()); setStatus("Settings saved.","ok");}
function getEndpoint(){return (localStorage.getItem("timestamp_endpoint")||DEFAULT_ENDPOINT_URL||"").trim()} function getUserName(){return (localStorage.getItem("timestamp_user")||DEFAULT_USER||"").trim()} function getIncidentId(){return (localStorage.getItem("timestamp_incident")||"").trim()}
function buildPayload({eventType,note}){const d=new Date(); return {event_time:d.toISOString(),event_time_local:formatTime(d),event_date_local:formatDate(d),event_type:eventType||"VOICE_NOTE",note:note||"",prompt:`${formatTime(d)} - ${note||eventType||""}`,user:getUserName(),incident_id:getIncidentId(),source:APP_SOURCE,user_agent:navigator.userAgent};}
async function postTimestamp(payload){const endpoint=getEndpoint(); if(!endpoint){setStatus("No endpoint URL set. Open Settings and paste your Apps Script Web App URL.","warn");return false} setStatus("Sending..."); try{await fetch(endpoint,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)}); saveHistory(payload); setStatus(`Logged: ${payload.event_time_local} ${payload.note||payload.event_type}`,"ok"); vibrate([60,40,60]); return true;}catch(err){setStatus("Send failed: "+err.message,"bad"); vibrate([250,100,250]); return false;}}
function vibrate(pattern){if("vibrate" in navigator) navigator.vibrate(pattern)}
function saveHistory(payload){const history=JSON.parse(localStorage.getItem("timestamp_history")||"[]"); history.unshift(payload); localStorage.setItem("timestamp_history",JSON.stringify(history.slice(0,15))); renderHistory();}
function renderHistory(){const history=JSON.parse(localStorage.getItem("timestamp_history")||"[]"); const el=$("history"); if(!history.length){el.innerHTML='<div class="small">No entries logged from this device yet.</div>'; return;} el.innerHTML=history.map(item=>`<div class="history-item"><strong>${escapeHtml(item.event_time_local||"")}</strong> ${escapeHtml(item.event_type||"")}<br />${escapeHtml(item.note||"")}</div>`).join("");}
function escapeHtml(str){return String(str).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function renderPresets(){const grid=$("presetGrid"); grid.innerHTML=""; PRESET_EVENTS.forEach(ev=>{const btn=document.createElement("button"); btn.textContent=ev.label; btn.addEventListener("click",()=>postTimestamp(buildPayload({eventType:ev.type,note:ev.label}))); grid.appendChild(btn);});}
function setupSpeechRecognition(){const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition; if(!SpeechRecognition){$("voiceButton").disabled=true; $("voiceButton").textContent="🎙️ Voice not supported"; setStatus("Speech recognition is not supported in this browser. Use Manual note or preset buttons.","warn"); return;} const recognition=new SpeechRecognition(); recognition.lang="en-GB"; recognition.interimResults=false; recognition.maxAlternatives=1; recognition.continuous=false; recognition.onstart=()=>{state.isListening=true; setStatus("Listening..."); $("voiceButton").textContent="🎙️ Listening..."}; recognition.onerror=e=>{state.isListening=false; $("voiceButton").textContent="🎙️ Voice note"; setStatus("Voice recognition error: "+e.error,"bad")}; recognition.onend=()=>{state.isListening=false; $("voiceButton").textContent="🎙️ Voice note"}; recognition.onresult=e=>{const text=e.results?.[0]?.[0]?.transcript||""; if(!text.trim()){setStatus("No speech detected.","warn"); return;} postTimestamp(buildPayload({eventType:"VOICE_NOTE",note:text.trim()}));}; state.recognition=recognition;}
function startVoice(){if(!state.recognition){setStatus("Voice recognition is not available. Use Manual note.","warn");return} try{state.recognition.start()}catch(err){setStatus("Could not start voice recognition: "+err.message,"bad")}}
function showManual(show){$("manualCard").style.display=show?"block":"none"; if(show) $("manualNote").focus();}
function setupInstallPrompt(){window.addEventListener("beforeinstallprompt",e=>{e.preventDefault(); state.deferredInstallPrompt=e; $("installButton").classList.remove("hidden")}); $("installButton").addEventListener("click",async()=>{if(!state.deferredInstallPrompt){setStatus("Use Chrome menu → Add to Home screen if install prompt is not available.","warn");return} state.deferredInstallPrompt.prompt(); await state.deferredInstallPrompt.userChoice; state.deferredInstallPrompt=null; $("installButton").classList.add("hidden");});}
async function registerServiceWorker(){if("serviceWorker" in navigator){try{await navigator.serviceWorker.register("service-worker.js")}catch(err){console.warn("Service worker registration failed",err)}}}
function bindEvents(){ $("saveSettingsButton").addEventListener("click",saveSettings); $("testButton").addEventListener("click",()=>{saveSettings(); postTimestamp(buildPayload({eventType:"TEST",note:"Test timestamp from Android PWA"}))}); $("voiceButton").addEventListener("click",startVoice); $("manualButton").addEventListener("click",()=>showManual(true)); $("cancelManualButton").addEventListener("click",()=>showManual(false)); $("sendManualButton").addEventListener("click",()=>{const note=$("manualNote").value.trim(); if(!note){setStatus("Enter a note first.","warn");return} postTimestamp(buildPayload({eventType:"MANUAL_NOTE",note})); $("manualNote").value=""; showManual(false);}); }
function init(){updateClock(); setInterval(updateClock,1000); loadSettings(); renderPresets(); renderHistory(); setupSpeechRecognition(); setupInstallPrompt(); bindEvents(); registerServiceWorker(); if(!getEndpoint()) setStatus("Set your Apps Script URL in Settings before first use.","warn");}
init();
</script>
</body>
</html>
