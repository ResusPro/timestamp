</style></head><body><main><header><div><h1>Timestamp Logger</h1><div class="sub">Mission timeline · v1.1</div></div><div class="clock"><strong id="clockTime">--:--</strong><span id="clockDate">--</span></div></header><section class="card"><div id="sceneTimer" class="scene-timer"><div class="scene-label">Patient contact time</div><div id="sceneTime" class="scene-time">00:00:00</div><div class="small" id="sessionLine">Shared episode state</div></div><div id="status" class="status">Ready.</div><a class="output-button" href="https://tiny.cc/MagpasTimestamp" target="_blank" rel="noopener">📋 Open Output</a><div class="small" style="text-align:center;margin:-2px 0 8px;">Default Magpas output link. Other organisations need their own short link.</div><div id="syncStatus" class="sync-status">Sync status loading...</div><div class="timeline-grid" id="timelineGrid"></div><div class="action-row"><button id="interventionButton">Intervention <span class="count" id="interventionCount">0 logged</span></button><button id="drugButton">Drug <span class="count" id="drugCount">0 logged</span></button></div><div class="timeline-grid" id="laterTimelineGrid" style="margin-top:10px;"></div><div class="job-row"><button class="mark" id="markButton">📍 Mark</button><button class="danger" id="clearButton">Clear</button></div><div class="job-row"><button class="secondary" id="manualButton">✍️ Manual note</button><button class="secondary" id="testButton">Send test</button></div></section><section class="card manual-card" id="manualCard"><label for="manualNote">Manual note</label><textarea id="manualNote" placeholder="e.g. Tourniquet applied left thigh"></textarea><div class="row"><button class="secondary" id="sendManualButton">Send note</button><button class="danger" id="cancelManualButton">Cancel</button></div></section><section class="card"><details id="setupDetails"><summary>User setup</summary><div class="row"><div><label for="organisation">Organisation</label><input id="organisation" placehol const APP_VERSION='1.1', DEFAULT_ENDPOINT_URL='https://script.google.com/macros/s/AKfycbwod6aYAyTsRAFcJwEfVoi-PZvFMhYgT_jHF1JWHo19wOS1BVpnPwZ1EbAjS59i1DnF/exec', DEFAULT_ORGANISATION='Magpas', DEFAULT_USER='', APP_SOURCE='PWA';

const $=id=>document.getElementById(id); const state={recognition:null,modalType:null,sceneAlertLevel:0,lastPullAt:0};

function getEndpoint(){return DEFAULT_ENDPOINT_URL.trim()} function getOrganisation(){return(localStorage.getItem('timestamp_organisation')||DEFAULT_ORGANISATION||'').trim()} function getUserName(){return(localStorage.getItem('timestamp_user')||DEFAULT_USER||'').trim()} function getCompletions(){return JSON.parse(localStorage.getItem('timestamp_completions')||'{}')} function setCompletions(o){localStorage.setItem('timestamp_completions',JSON.stringify(o))} function getHistory(){return JSON.parse(localStorage.getItem('timestamp_history')||'[]')} function setHistory(a){localStorage.setItem('timestamp_history',JSON.stringify(a.slice(0,100)))} function getPendingQueue(){return JSON.parse(localStorage.getItem('timestamp_pending_queue')||'[]')} function setPendingQueue(q){localStorage.setItem('timestamp_pending_queue',JSON.stringify(q))} function makeLocalId(){return 'local-'+Date.now()+'-'+Math.random().toString(36).slice(2,10)} function getSessionId(){return localStorage.getItem('timestamp_session_id')||''} function setSessionId(id){if(id)localStorage.setItem('timestamp_session_id',id)}

async function postTimestamp(payload,markComplete=true){if(!payload.user){setStatus('Add user/callsign in User setup before logging.','warn');$('setupDetails').open=true;return false} saveHistory(payload);enqueuePending(payload);if(markComplete&&!['VOICE_NOTE','MANUAL_NOTE','TEST','CLEAR','JOB_COMPLETE','MARK'].includes(payload.event_type)){const d=getCompletions();d[payload.event_type]={time:payload.event_time_local,note:payload.note,category:payload.event_category,event_time:payload.event_time,source:payload.source,app_version:payload.app_version};setCompletions(d)} handleTimerEvent(payload);renderAll();updateSyncStatus();setStatus(`Saved locally: ${payload.event_time_local} ${payload.note||payload.event_type}`,'warn');vibrate([40]);await syncPending();await pullActiveEpisode(false);return true;}
function handleTimerEvent(p){if(p.event_type==='WITH_PATIENT'){localStorage.setItem('timestamp_scene_start',p.event_time);localStorage.removeItem('timestamp_scene_stop');state.sceneAlertLevel=0} if(p.event_type==='HANDOVER_COMPLETE')localStorage.setItem('timestamp_scene_stop',p.event_time); if(p.event_type==='CLEAR'){['timestamp_scene_start','timestamp_scene_stop','timestamp_session_id'].forEach(k=>localStorage.removeItem(k));state.sceneAlertLevel=0} updateSceneTimer();}
function updateSceneTimer(){const start=localStorage.getItem('timestamp_scene_start'),stop=localStorage.getItem('timestamp_scene_stop'),box=$('sceneTimer');if(!start){box.className='scene-timer';return} const startMs=Date.parse(start),endMs=stop?Date.parse(stop):Date.now(); if(!Number.isFinite(startMs)){box.className='scene-timer';return} const secs=Math.max(0,Math.floor((endMs-startMs)/1000)),h=String(Math.floor(secs/3600)).padStart(2,'0'),m=String(Math.floor((secs%3600)/60)).padStart(2,'0'),s=String(secs%60).padStart(2,'0');$('sceneTime').textContent=`${h}:${m}:${s}`;box.className='scene-timer active'+(secs>=1200?' bad':secs>=600?' warn':'');$('sessionLine').textContent=getSessionId()?`Session ${getSessionId()}`:'Started at With Patient · stops at Handover or Clear'; if(!stop){const level=Math.floor(secs/600);if(level>0&&level>state.sceneAlertLevel){state.sceneAlertLevel=level;vibrate([120,80,120]);setStatus(`${level*10} min patient contact time`,'warn');}}}
function enqueuePending(p){const q=getPendingQueue();if(!q.some(x=>x.local_id===p.local_id)){q.push(p);setPendingQueue(q)}} function saveHistory(p){const h=getHistory();h.unshift(p);setHistory(h)} function markHistorySent(id){setHistory(getHistory().map(x=>x.local_id===id?{...x,sync_status:'sent'}:x))}

async function pullActiveEpisode(show=false){if(!navigator.onLine)return; const org=getOrganisation(),user=getUserName(); if(!org||!user)return; try{const res=await fetch(getEndpoint()+`?action=activeEpisode&organisation=${encodeURIComponent(org)}&user=${encodeURIComponent(user)}`,{method:'GET',cache:'no-store'});const data=await res.json();applyActiveEpisode(data);state.lastPullAt=Date.now();if(show)setStatus('Shared episode state loaded.','ok');}catch(e){if(show)setStatus('Could not load shared state: '+e.message,'warn')}}
function applyActiveEpisode(data){if(!data||data.status==='none'){renderAll();return} if(data.session_id)setSessionId(data.session_id); if(data.timer_start)localStorage.setItem('timestamp_scene_start',data.timer_start);else localStorage.removeItem('timestamp_scene_start'); if(data.timer_stop)localStorage.setItem('timestamp_scene_stop',data.timer_stop);else localStorage.removeItem('timestamp_scene_stop'); const done=getCompletions(),tl=data.timeline||{};Object.keys(tl).forEach(type=>{const ev=tl[type]||{}; if(!['VOICE_NOTE','MANUAL_NOTE','TEST','CLEAR','JOB_COMPLETE','MARK'].includes(type))done[type]={time:ev.event_time_local||'',note:ev.note||'',category:ev.event_category||'',event_time:ev.event_time||'',source:ev.source||'',app_version:ev.app_version||''};});setCompletions(done);renderAll();const dbg=$('activeEpisodeDebug');if(dbg)dbg.textContent=`Shared: ${data.status||'none'} · ${data.session_id||'no session'} · last ${data.last_event_type||'none'}`;}
function updateSyncStatus(){const el=$('syncStatus'),count=getPendingQueue().length,pulled=state.lastPullAt?` · shared ${Math.round((Date.now()-state.lastPullAt)/1000)}s ago`:''; if(!navigator.onLine){el.className='sync-status bad';el.textContent=count?`Offline · ${count} pending`:'Offline'} else if(count){el.className='sync-status warn';el.textContent=`Online · ${count} pending sync${pulled}`} else{el.className='sync-status ok';el.textContent=`Online · all synced${pulled}`}}
function vibrate(p){if('vibrate'in navigator)navigator.vibrate(p)} function renderTimeline(){const done=getCompletions(),top=$('timelineGrid'),later=$('laterTimelineGrid');top.innerHTML='';later.innerHTML='';const topTypes=['MOBILE','LANDED','ARRIVE_SCENE','WITH_PATIENT'];TIMELINE_EVENTS.forEach(ev=>{const b=document.createElement('button');b.className='timeline-btn'+(done[ev.type]?' done':'');b.innerHTML=`<span class="label">${escapeHtml(ev.label)}</span><span class="time">${done[ev.type]?.time||''}</span>`;b.addEventListener('click',()=>postTimestamp(buildPayload({eventType:ev.type,note:ev.label,category:'timeline'})));if(topTypes.includes(ev.type))top.appendChild(b);else{if(ev.type==='READY_TO_LEAVE_SCENE')b.style.gridColumn='1 / -1';later.appendChild(b)}})}
function renderCounts(){const done=getCompletions();$('interventionCount').textContent=(Object.values(done).filter(x=>x.category==='intervention').length)+' logged';$('drugCount').textContent=(Object.values(done).filter(x=>x.category==='drug').length)+' logged';} function renderHistory(){const h=getHistory(),el=$('history'); if(!h.length){el.innerHTML='<div class="small">No entries logged from this device yet.</div>';return} el.innerHTML=h.map(item=>`<div class="history-item"><strong>${escapeHtml(item.event_time_local||'')}</strong> ${escapeHtml(item.note||item.event_type||'')}<br><span class="small">${escapeHtml(item.event_category||'')} · ${escapeHtml(item.organisation||'')} / ${escapeHtml(item.user||'')} · ${escapeHtml(item.sync_status||'sent')}</span></div>`).join('');} function renderAll(){renderTimeline();renderCounts();renderHistory();updateSceneTimer();}
function openModal(type){state.modalType=type;const items=type==='intervention'?INTERVENTIONS:DRUGS;$('modalTitle').textContent=type==='intervention'?'Intervention':'Drug';$('otherLabel').textContent=type==='intervention'?'Other intervention':'Other drug';$('otherText').value='';$('otherPanel').classList.remove('active');const done=getCompletions(),list=$('modalList');list.innerHTML='';items.forEach(item=>{const b=document.createElement('button');b.className=done[item.type]?'done':'';b.innerHTML=`${escapeHtml(item.label)}${done[item.type]?`<span class="time">✓ ${escapeHtml(done[item.type].time)}</span>`:''}`;b.addEventListener('click',()=>{closeModal();postTimestamp(buildPayload({eventType:item.type,note:item.label,category:type}))});list.appendChild(b)});const other=document.createElement('button');other.textContent='Other...';other.addEventListener('click',()=>{$('otherPanel').classList.add('active');$('otherText').focus()});list.appendChild(other);$('modalBackdrop').style.display='flex';}
function closeModal(){$('modalBackdrop').style.display='none';state.modalType=null;$('otherPanel').classList.remove('active')} function slugifyEventType(p,t){const c=String(t||'').trim().toUpperCase().replace(/[^A-Z0-9]+/g,'_').replace(/^_+|_+$/g,'').slice(0,60);return `${p}_OTHER_${c||'UNSPECIFIED'}`} function sendOtherItem(){const text=$('otherText').value.trim();if(!text){setStatus('Enter the other item first.','warn');return} const type=state.modalType,prefix=type==='drug'?'DRUG':'INTERVENTION';closeModal();postTimestamp(buildPayload({eventType:slugifyEventType(prefix,text),note:text,category:type}));}
function setupSpeechRecognition(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){$('voiceButton').disabled=true;$('voiceButton').textContent='🎙️ Voice not supported';return} const r=new SR();r.lang='en-GB';r.interimResults=false;r.maxAlternatives=1;r.continuous=false;r.onstart=()=>{$('voiceButton').classList.add('listening');$('voiceButton').textContent='🔴 LISTENING...';setStatus('Listening...')};r.onerror=e=>{$('voiceButton').classList.remove('listening');$('voiceButton').textContent='🎙️ VOICE NOTE';setStatus('Voice error: '+e.error,'bad')};r.onend=()=>{$('voiceButton').classList.remove('listening');$('voiceButton').textContent='🎙️ VOICE NOTE'};r.onresult=e=>{const text=e.results?.[0]?.[0]?.transcript||'';if(text.trim())postTimestamp(buildPayload({eventType:'VOICE_NOTE',note:text.trim(),category:'voice'}),false)};state.recognition=r;}
function startVoice(){try{state.recognition?.start()}catch(e){setStatus('Could not start voice: '+e.message,'bad')}} function showManual(s){$('manualCard').style.display=s?'block':'none';if(s)$('manualNote').focus()} async function clearEpisode(){if(!confirm('End patient episode?

This will clear the local timeline.
